<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Image Gallery</h1>

<div class="filter-buttons">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('nature')">Nature</button>
<button onclick="filterSelection('city')">City</button>
<button onclick="filterSelection('animals')">Animals</button>
</div>

<div class="gallery">

<div class="image nature">
<img src="https://picsum.photos/id/1018/400/300" onclick="openLightbox(this)">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(this)">
</div>

<div class="image animals">
<img src="https://picsum.photos/id/1024/400/300" onclick="openLightbox(this)">
</div>

<div class="image nature">
<img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(this)">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1011/400/300" onclick="openLightbox(this)">
</div>

<div class="image animals">
<img src="https://picsum.photos/id/1025/400/300" onclick="openLightbox(this)">
</div>

</div>

<!-- Lightbox -->

<div id="lightbox">
<span class="close" onclick="closeLightbox()">×</span>

<button class="prev" onclick="changeSlide(-1)">❮</button>

<img id="lightbox-img">

<button class="next" onclick="changeSlide(1)">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
